# How charged the device's battery is.
[battery]
full_symbol        = "¾░ü╣ "
charging_symbol    = "¾░éä "
discharging_symbol = "¾░éā "
unknown_symbol     = "¾░éæ "
empty_symbol       = "¾░éÄ "
format  = '[$symbol$percentage]($style)'
# Battery: 10%
[[battery.display]]
threshold = 10
style     = "red bold"
discharging_symbol = "¾░ü║ "
# Battery: 20%
[[battery.display]]
threshold = 20
style     = "red"
discharging_symbol = "¾░ü╗ "
# Battery: 30%
[[battery.display]]
threshold = 30
style     = "yellow"
discharging_symbol = "¾░ü╝ "
# Battery: 40%
[[battery.display]]
threshold = 40
style     = "bright-yellow"
discharging_symbol = "¾░üĮ "
# Battery: 50%
[[battery.display]]
threshold = 50
style     = "bright-yellow"
discharging_symbol = "¾░üŠ "
# Battery: 60%
[[battery.display]]
threshold = 60
style     = "green"
discharging_symbol = "¾░ü┐ "
# Battery: 70%
[[battery.display]]
threshold = 70
style     = "green"
discharging_symbol = "¾░éĆ "
# Battery: 80%
[[battery.display]]
threshold = 80
style     = "green"
discharging_symbol = "¾░éü "
# Battery: 90%
[[battery.display]]
threshold = 90
style     = "green"
discharging_symbol = "¾░éé "
# Battery: 100%
[[battery.display]]
threshold = 100
style     = "green"
discharging_symbol = "¾░ü╣ "

# How long the last command took to execute.
[cmd_duration]
min_time = 250
show_milliseconds  = true
format   = '[$duration]($style) '
style    = "yellow"

# Path to your current directory.
[directory]
format = '[$read_only]($read_only_style)[$path]($style) '
style     = "bold blue"
read_only = "¾░īŠ "

# Active branch of the repo in your current directory.
[git_branch]
format = '\[[$symbol$branch(:$remote_branch)]($style)\]'
style  = "green"

# Current commit hash and also the tag (if any) of the repo in your current
# directory.
[git_commit]
format = '\[[$hash$tag]($style)\]'
style = "bold italic bright-yellow"

# Number of added and deleted lines in the current git repository.
[git_metrics]
disabled = true

# Operations in progress of the repo in your current directory.
[git_state]
format       = '\[[$state( $progress_current/$progress_total)]($style)\]'
rebase       = "rebase"
merge        = "merge"
revert       = "revert"
cherry_pick  = "cherry_pick"
bisect       = "bisect"
am           = "am"
am_or_rebase = "am_or_rebase"
style        = "purple"

# Symbols representing the state of the repo in your current directory.
[git_status]
format     = """\\[[\
    $conflicted\
    $stashed\
    $staged\
    $renamed\
    $deleted\
    $typechanged\
    $untracked\
    $modified\
    $ahead_behind\
]($style)\\] """
conflicted  = '[=](bold purple)'
stashed     = '[\$](bold bright-black)'
staged      = '[Ō£ö](bold green)'
modified    = '[Ō£ś](bold red)'
renamed     = '[#](bold yellow)'
deleted     = '[!](bold yellow)'
typechanged = '[%](bold yellow)'
untracked   = '[?](bold yellow)'
ahead       = '[Ōåæ](bold bright-blue)'
behind      = '[Ōåō](bold bright-blue)'
diverged    = '[~](bold bright-blue)'
style       = "cyan"
ignore_submodules = true

# Current number of jobs running.
[jobs]
number_threshold = 1
format = '[$number$symbol]($style) '
symbol = "!"
style  = "bright-yellow"

# Separates the prompt into two lines.
[line_break]
disabled = true

# Current directory is the repository for a package.
[package]
symbol   = "¾░ÅŚ "
disabled = true

# Exit code of the previous command.
[status]
format     = '[$status$symbol]($style) '
symbol                = "?"
not_executable_symbol = ";"
not_found_symbol      = "#"
sigint_symbol         = "!"
signal_symbol         = "@"
style      = "red"
map_symbol = true
disabled   = false

# Current local time.
[time]
format   = '[\[$time\]]($style) '
style    = "bright-black"
disabled = false

# Active user's username.
[username]
style_root  = "bright-yellow"
style_user  = "bright-blue"
format      = '[$user]($style) '
show_always = true
